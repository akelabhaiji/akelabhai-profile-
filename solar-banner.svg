<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160" width="800" height="160">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#000005"/>
    </radialGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff7aa"/>
      <stop offset="40%" stop-color="#ffcc00"/>
      <stop offset="100%" stop-color="#ff6600"/>
    </radialGradient>
    <radialGradient id="earth" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#6af"/>
      <stop offset="100%" stop-color="#0050aa"/>
    </radialGradient>
    <radialGradient id="mars" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ff9966"/>
      <stop offset="100%" stop-color="#cc2200"/>
    </radialGradient>
    <radialGradient id="jupiter" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#f0d090"/>
      <stop offset="100%" stop-color="#c8860a"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sunGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Star pattern -->
    <pattern id="stars" x="0" y="0" width="200" height="160" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="20" r="0.8" fill="white" opacity="0.8"/>
      <circle cx="45" cy="8" r="0.6" fill="white" opacity="0.6"/>
      <circle cx="80" cy="35" r="1" fill="white" opacity="0.9"/>
      <circle cx="120" cy="15" r="0.7" fill="white" opacity="0.7"/>
      <circle cx="160" cy="50" r="0.8" fill="white" opacity="0.8"/>
      <circle cx="30" cy="70" r="0.6" fill="white" opacity="0.5"/>
      <circle cx="70" cy="90" r="0.9" fill="white" opacity="0.8"/>
      <circle cx="110" cy="75" r="0.7" fill="white" opacity="0.6"/>
      <circle cx="150" cy="100" r="0.8" fill="white" opacity="0.9"/>
      <circle cx="190" cy="60" r="0.6" fill="white" opacity="0.7"/>
      <circle cx="20" cy="130" r="0.9" fill="white" opacity="0.8"/>
      <circle cx="60" cy="145" r="0.7" fill="white" opacity="0.6"/>
      <circle cx="100" cy="120" r="0.8" fill="white" opacity="0.9"/>
      <circle cx="140" cy="140" r="0.6" fill="white" opacity="0.7"/>
      <circle cx="180" cy="125" r="1" fill="white" opacity="0.8"/>
      <circle cx="55" cy="155" r="0.6" fill="white" opacity="0.5"/>
      <circle cx="170" cy="10" r="0.8" fill="white" opacity="0.7"/>
      <circle cx="95" cy="55" r="0.7" fill="white" opacity="0.6"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="160" fill="url(#bg)"/>
  <rect width="800" height="160" fill="url(#stars)"/>

  <!-- Sun (left side) -->
  <circle cx="80" cy="80" r="28" fill="url(#sun)" filter="url(#sunGlow)" opacity="0.95"/>

  <!-- Orbit rings (ellipses, perspective) -->
  <!-- Mercury orbit -->
  <ellipse cx="80" cy="80" rx="50" ry="12" fill="none" stroke="white" stroke-width="0.3" opacity="0.15"/>
  <!-- Venus orbit -->
  <ellipse cx="80" cy="80" rx="80" ry="20" fill="none" stroke="white" stroke-width="0.3" opacity="0.15"/>
  <!-- Earth orbit -->
  <ellipse cx="80" cy="80" rx="115" ry="28" fill="none" stroke="white" stroke-width="0.3" opacity="0.15"/>
  <!-- Mars orbit -->
  <ellipse cx="80" cy="80" rx="155" ry="38" fill="none" stroke="white" stroke-width="0.3" opacity="0.15"/>
  <!-- Jupiter orbit -->
  <ellipse cx="80" cy="80" rx="210" ry="52" fill="none" stroke="white" stroke-width="0.3" opacity="0.15"/>
  <!-- Saturn orbit -->
  <ellipse cx="80" cy="80" rx="270" ry="66" fill="none" stroke="white" stroke-width="0.3" opacity="0.1"/>

  <!-- Mercury -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 80 80" to="360 80 80" dur="4s" repeatCount="indefinite"/>
    <ellipse cx="80" cy="80" rx="50" ry="12" fill="none"/>
    <circle cx="130" cy="80" r="3" fill="#aaaaaa" filter="url(#glow)"/>
  </g>

  <!-- Venus -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 80 80" to="360 80 80" dur="7s" repeatCount="indefinite"/>
    <circle cx="160" cy="80" r="4.5" fill="#e8c87a" filter="url(#glow)"/>
  </g>

  <!-- Earth -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="45 80 80" to="405 80 80" dur="11s" repeatCount="indefinite"/>
    <circle cx="195" cy="80" r="5.5" fill="url(#earth)" filter="url(#glow)"/>
  </g>

  <!-- Mars -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="120 80 80" to="480 80 80" dur="18s" repeatCount="indefinite"/>
    <circle cx="235" cy="80" r="4" fill="url(#mars)" filter="url(#glow)"/>
  </g>

  <!-- Jupiter -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="200 80 80" to="560 80 80" dur="42s" repeatCount="indefinite"/>
    <circle cx="290" cy="80" r="9" fill="url(#jupiter)" filter="url(#glow)"/>
    <!-- Jupiter bands -->
    <ellipse cx="290" cy="78" rx="9" ry="2" fill="#a06010" opacity="0.4">
      <animateTransform attributeName="transform" type="rotate" from="200 80 80" to="560 80 80" dur="42s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Saturn -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="300 80 80" to="660 80 80" dur="90s" repeatCount="indefinite"/>
    <circle cx="350" cy="80" r="7.5" fill="#d4b483" filter="url(#glow)"/>
    <!-- Saturn ring -->
    <ellipse cx="350" cy="80" rx="14" ry="4" fill="none" stroke="#c8a060" stroke-width="2.5" opacity="0.7">
      <animateTransform attributeName="transform" type="rotate" from="300 80 80" to="660 80 80" dur="90s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Text overlay -->
  <text x="400" y="68" font-family="Georgia, serif" font-size="30" font-weight="bold" fill="white" text-anchor="middle" opacity="0.95" letter-spacing="2">Akela Bhai</text>
  <text x="400" y="95" font-family="Georgia, serif" font-size="13" fill="#cccccc" text-anchor="middle" opacity="0.85" letter-spacing="1">Web Designer • Personal Branding Consultant</text>

  <!-- Shooting star animation -->
  <line x1="600" y1="20" x2="620" y2="30" stroke="white" stroke-width="1" opacity="0">
    <animate attributeName="opacity" values="0;1;0" dur="5s" begin="2s" repeatCount="indefinite"/>
    <animate attributeName="x1" values="500;650" dur="5s" begin="2s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="520;670" dur="5s" begin="2s" repeatCount="indefinite"/>
    <animate attributeName="y1" values="15;40" dur="5s" begin="2s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="20;45" dur="5s" begin="2s" repeatCount="indefinite"/>
  </line>
</svg>
